<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Delete GAIGS account</title><style>body{margin:0;background:#07111d;color:#dceaf4;font:16px/1.6 system-ui}main{max-width:620px;margin:auto;padding:36px 20px}a{color:#25d0ff}.box{border:1px solid #29506a;border-radius:16px;padding:20px;background:#0c1d2c}label{display:block;margin:14px 0 6px}input{box-sizing:border-box;width:100%;padding:12px;border-radius:9px;border:1px solid #41647a;background:#07111d;color:white}button{margin-top:16px;width:100%;padding:13px;border:0;border-radius:10px;background:#d94b5b;color:white;font-weight:800}#status{min-height:24px}</style><script src="./config.js"></script><script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-functions-compat.js"></script></head><body><main><p><a href="./gaigs/">← Back to GAIGS</a></p><h1>Request account deletion</h1><div class="box"><p>Sign in again to protect your account, then request permanent deletion. Access is disabled immediately; associated data enters the purge queue.</p><form id="deleteForm"><label>Email<input id="email" type="email" required autocomplete="email"></label><label>Password<input id="password" type="password" required autocomplete="current-password"></label><label>Type DELETE<input id="confirm" required pattern="DELETE"></label><button>Delete my account</button></form><p id="status"></p></div><p>See the <a href="./privacy.html">privacy policy</a> for deletion and narrow legal-retention details.</p></main><script>const status=document.getElementById('status'),form=document.getElementById('deleteForm');const configured=window.NDCONF&&window.NDCONF.firebase&&window.NDCONF.firebase.apiKey&&!String(window.NDCONF.firebase.apiKey).startsWith('YOUR_');if(!configured){status.textContent='The production account service is not configured on this deployment.';form.querySelector('button').disabled=true;}else{firebase.initializeApp(window.NDCONF.firebase);form.addEventListener('submit',async event=>{event.preventDefault();status.textContent='Signing in and submitting request…';try{const emailInput=document.getElementById('email'),passwordInput=document.getElementById('password');await firebase.auth().signInWithEmailAndPassword(emailInput.value,passwordInput.value);const result=await firebase.functions().httpsCallable('requestAccountDeletion')({});status.textContent=result.data.message||'Deletion request submitted.';form.remove();}catch(error){status.textContent=error.message||'Deletion request failed.';}});}</script></body></html>
