<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"><title>GAIGS Daily Resilience World</title><style>html,body{margin:0;height:100%;background:#07111d;color:#ddecf6;font-family:system-ui;overflow:hidden}#app{height:100%;display:grid;grid-template-rows:auto 1fr auto}.top{padding:10px 12px;border-bottom:1px solid #24465d;background:#0b1b29}.top h1{font-size:16px;margin:0}.top p{font-size:10px;color:#8fa9ba;margin:4px 0 0}.world{display:grid;place-items:center;min-height:0;padding:8px}canvas{max-width:100%;max-height:100%;border:1px solid #2d5871;border-radius:12px;touch-action:none;background:#102635}.panel{border-top:1px solid #24465d;background:#0b1b29;padding:9px;display:grid;gap:8px}.tools,.actions,.metrics{display:flex;gap:6px;overflow:auto}.tools button,.actions button{border:1px solid #315870;background:#10283a;color:#ddecf6;border-radius:9px;padding:8px 10px;white-space:nowrap}.tools button.active{background:#1ba8dc;color:#02131e}.actions button.primary{background:#2b77ff;border-color:#2b77ff}.metric{min-width:82px;background:#10283a;border-radius:8px;padding:6px 8px}.metric small{display:block;color:#7f9aae;font-size:8px}.metric b{font-size:13px}.notice{font-size:9px;color:#91a9b8}</style></head><body><div id="app"><header class="top"><h1 id="title">Daily Resilience World</h1><p id="mission"></p></header><main class="world"><canvas id="world" width="720" height="720"></canvas></main><footer class="panel"><div class="metrics"><div class="metric"><small>Budget left</small><b id="budget">0</b></div><div class="metric"><small>Coverage</small><b id="coverage">0%</b></div><div class="metric"><small>Resilience</small><b id="score">Not tested</b></div></div><div class="tools" id="tools"></div><div class="actions"><button id="reset">Reset</button><button class="primary" id="simulate">Run stress test</button><button id="submit" disabled>Save review receipt</button></div><div class="notice">Daily missions are learning simulations. Points and real-world claims require independent evidence review; no currency is minted here.</div></footer></div><script>(()=>{'use strict';const SIZE=12,CELL=60,RULES='resilience-world-1.0',today=new Date().toISOString().slice(0,10),missionIndex=hash(today)%3,missions=[{id:'flood',name:'Monsoon flood readiness',brief:'Protect homes with drainage, trees and reachable shelter. Budget: 90.',budget:90},{id:'water',name:'Safe-water access',brief:'Power filters and bring safe water coverage to every home. Budget: 85.',budget:85},{id:'energy',name:'Neighbourhood energy resilience',brief:'Power homes with distributed solar while preserving shade. Budget: 80.',budget:80}],mission=missions[missionIndex],cost={drain:6,tree:3,shelter:18,filter:15,solar:10},icon={ground:'·',water:'≈',home:'⌂',drain:'═',tree:'♣',shelter:'H',filter:'F',solar:'☀'},color={ground:'#173447',water:'#176b9a',home:'#c79045',drain:'#7eb9d4',tree:'#31905a',shelter:'#8a66d5',filter:'#25c6be',solar:'#f2c84b'};let grid=[],placed=[],selected='drain',budget=mission.budget,last=null,startedAt=Date.now();const canvas=document.getElementById('world'),ctx=canvas.getContext('2d');document.getElementById('mission').textContent=`${today} · ${mission.name}: ${mission.brief}`;function hash(text){let h=2166136261;for(const c of text)h=Math.imul(h^c.charCodeAt(0),16777619);return h>>>0}function rand(seed){return()=>((seed=Math.imul(seed^seed>>>15,1|seed)+0x6D2B79F5)|0,((seed^seed>>>7)>>>0)/4294967296)}function make(){const r=rand(hash(today+mission.id));grid=Array.from({length:SIZE},(_,y)=>Array.from({length:SIZE},(_,x)=>({base:(x<2||r()<.08)?'water':'ground',item:null})));let homes=0;while(homes<12){const x=2+Math.floor(r()*(SIZE-2)),y=Math.floor(r()*SIZE),cell=grid[y][x];if(cell.base==='ground'&&!cell.item){cell.item='home';homes++}}placed=[];budget=mission.budget;last=null;startedAt=Date.now();document.getElementById('submit').disabled=true;draw();update()}function draw(){ctx.clearRect(0,0,720,720);for(let y=0;y<SIZE;y++)for(let x=0;x<SIZE;x++){const c=grid[y][x],kind=c.item||c.base;ctx.fillStyle=color[kind];ctx.fillRect(x*CELL,y*CELL,CELL-1,CELL-1);ctx.fillStyle=kind==='solar'?'#3a2f00':'#eef8ff';ctx.font=kind==='home'?'bold 30px system-ui':'24px system-ui';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(icon[kind],x*CELL+CELL/2,y*CELL+CELL/2)}}function update(){document.getElementById('budget').textContent=budget;document.getElementById('coverage').textContent=last?`${last.coverage}%`:'0%';document.getElementById('score').textContent=last?`${last.score}/100`:'Not tested'}function near(x,y,type,radius=1){let n=0;for(let yy=Math.max(0,y-radius);yy<=Math.min(SIZE-1,y+radius);yy++)for(let xx=Math.max(0,x-radius);xx<=Math.min(SIZE-1,x+radius);xx++)if(grid[yy][xx].item===type||grid[yy][xx].base===type)n++;return n}function simulate(){const homes=[];for(let y=0;y<SIZE;y++)for(let x=0;x<SIZE;x++)if(grid[y][x].item==='home')homes.push({x,y});let protectedHomes=0,systems=0;if(mission.id==='flood')for(const h of homes){const risk=near(h.x,h.y,'water',2),protection=near(h.x,h.y,'drain',1)*2+near(h.x,h.y,'tree',1)+near(h.x,h.y,'shelter',3)*2;if(protection>=Math.max(1,risk))protectedHomes++}if(mission.id==='water')for(const h of homes){const filters=near(h.x,h.y,'filter',3),powered=near(h.x,h.y,'solar',2);if(filters&&powered)protectedHomes++}if(mission.id==='energy')for(const h of homes){const power=near(h.x,h.y,'solar',2),shade=near(h.x,h.y,'tree',2);if(power&&shade)protectedHomes++}systems=placed.filter(p=>p.type!=='tree').length;const coverage=Math.round(protectedHomes/homes.length*100),diversity=new Set(placed.map(p=>p.type)).size,efficiency=Math.max(0,20-Math.round((mission.budget-budget)/mission.budget*10)),score=Math.min(100,Math.round(coverage*.7+diversity*3+efficiency));last={score,coverage,budgetUsed:mission.budget-budget,systems,placements:placed.slice()};document.getElementById('submit').disabled=false;update()}async function submit(){if(!last)return;const completedAt=Date.now(),payload={challengeId:'daily-resilience-world',date:today,mission:mission.id,seed:hash(today+mission.id),placements:last.placements,score:last.score,coverage:last.coverage,rulesVersion:RULES,startedAt,completedAt,durationMs:completedAt-startedAt,engine:'gaigs-grid-v1'},bytes=new TextEncoder().encode(JSON.stringify(payload)),digest=await crypto.subtle.digest('SHA-256',bytes),solutionHash=[...new Uint8Array(digest)].map(x=>x.toString(16).padStart(2,'0')).join('');parent.postMessage({type:'gaigs:challenge-completed',...payload,solutionHash},'*')}canvas.addEventListener('pointerdown',event=>{const rect=canvas.getBoundingClientRect(),x=Math.floor((event.clientX-rect.left)/rect.width*SIZE),y=Math.floor((event.clientY-rect.top)/rect.height*SIZE),cell=grid[y]?.[x];if(!cell||cell.base!=='ground'||cell.item==='home')return;if(cell.item){budget+=cost[cell.item]||0;placed=placed.filter(p=>p.x!==x||p.y!==y);cell.item=null}else if(budget>=cost[selected]){cell.item=selected;budget-=cost[selected];placed.push({x,y,type:selected})}last=null;document.getElementById('submit').disabled=true;draw();update()});const toolBox=document.getElementById('tools');Object.keys(cost).forEach(type=>{const b=document.createElement('button');b.textContent=`${icon[type]} ${type} · ${cost[type]}`;b.classList.toggle('active',type===selected);b.onclick=()=>{selected=type;[...toolBox.children].forEach(x=>x.classList.remove('active'));b.classList.add('active')};toolBox.appendChild(b)});document.getElementById('reset').onclick=make;document.getElementById('simulate').onclick=simulate;document.getElementById('submit').onclick=submit;make()})();</script></body></html>
