[build]
  command = "npm ci && npm run build:production"
  publish = "dist-web"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/GAIGS"
  to = "/gaigs/index.html"
  status = 200

[[redirects]]
  from = "/GAIGS/*"
  to = "/gaigs/:splat"
  status = 200

[[redirects]]
  from = "/gaigs"
  to = "/gaigs/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), geolocation=(self), microphone=(self), payment=()"

[[headers]]
  for = "/gaigs/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://unpkg.com; style-src 'self' 'unsafe-inline' https://unpkg.com; img-src 'self' data: blob: https://*.tile.openstreetmap.org; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com wss://*.firebaseio.com https://*.infura.io https://*.alchemy.com; media-src 'self' blob:; worker-src 'self' blob:; frame-ancestors 'self'; base-uri 'self'; form-action 'self'"

